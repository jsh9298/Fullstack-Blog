name: CI/CD Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: lowercase repo name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ⚠️ [내-계정명]과 [레포-이름]을 본인 것에 맞게 수정하세요.
          tags: ghcr.io/${{ env.REPO_LC }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify n8n
        if: always()
        run: |
          # 1. 로그 추출 (특수문자 처리 전 순수 로그)
          RAW_LOG=$(tail -n 10 ${{ github.workspace }}/build.log 2>/dev/null || echo "No log available")

          # 2. jq로 안전한 JSON 생성 (모든 이스케이프 자동 처리)
          JSON_DATA=$(jq -n \
            --arg status "${{ job.status }}" \
            --arg repo "${{ github.repository }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg actor "${{ github.actor }}" \
            --arg commit_msg "${{ github.event.head_commit.message }}" \
            --arg error_detail "$RAW_LOG" \
            '{
              status: $status,
              repo: $repo,
              workflow: $workflow,
              run_id: $run_id,
              run_url: $run_url,
              actor: $actor,
              commit_msg: $commit_msg,
              error_detail: $error_detail
            }')

          # 3. 전송
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -H "X-N8N-API-KEY: ${{ secrets.N8N_AUTH_KEY }}" \
            -d "$JSON_DATA"