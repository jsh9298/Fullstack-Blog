name: CI/CD Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: lowercase repo name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ⚠️ [내-계정명]과 [레포-이름]을 본인 것에 맞게 수정하세요.
          tags: ghcr.io/${{ env.REPO_LC }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 배포 성공 시 [n8n]으로 신호 보내기
      - name: Notify n8n
        if: always() # 성공하든 실패하든 무조건 실행
        run: |
          ERROR_LOG=$(tail -n 10 ${{ github.workspace }}/build.log 2>/dev/null | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}' || echo "No log available")

          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -H "X-N8N-API-KEY: ${{ secrets.N8N_AUTH_KEY }}" \
          -d '{
            "status": "${{ job.status }}",
            "repo": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "actor": "${{ github.actor }}",
            "commit_msg": "${{ github.event.head_commit.message }}"
            "error_detail": "'"${ERROR_LOG//$'\n'/\\n}"'"
          }'